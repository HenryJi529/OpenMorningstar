<h3>评论区: 共 <span>{{ comment_count }}</span> 条评论</h3>
<ul class="comment-list list-unstyled">
	{% for comment in comment_list %}
	<li class="comment-item">
		<div>
			昵称：<span class="name">{{ comment.name }}</span>
			{% if comment.email %}
			<span class="email">({{comment.email}})</span>
			{% endif %}
		</div>
		<div>
			更新于<span>{{comment.updated|timesince}}</span>前
		</div>
		<div class="text">
			{{ comment.body|linebreaks }}
		</div>
		<hr>
	</li>
	{% empty %}
	暂无评论
	{% endfor %}
</ul>
